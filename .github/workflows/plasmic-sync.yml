name: Sync Plasmic Designs

on:
  repository_dispatch:
    types: [plasmic_publish]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Use the App token so git pushes are authenticated as the App
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Plasmic Sync
        run: npx plasmic sync --projects ${{ secrets.PLASMIC_PROJECT_ID }}:${{ secrets.PLASMIC_PROJECT_TOKEN }} --yes

      - name: Create Pull Request
        id: cpr

        uses: peter-evans/create-pull-request@v5
        with:
          # Use the App token to authorize PR creation
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "Auto-sync Plasmic changes & update dependencies"
          title: "Auto-sync: Plasmic changes"
          body: "Automated sync from Plasmic. Vercel checks will run automatically."
          branch: plasmic-sync-${{ github.run_id }}
          delete-branch: true

      - name: Enable Auto-merge
        run: |
          gh pr merge "${{ env.PULL_REQUEST_NUMBER }}" \
            --squash \
            --auto
        env:
          # Use the App token to authorize the auto-merge command
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          PULL_REQUEST_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
